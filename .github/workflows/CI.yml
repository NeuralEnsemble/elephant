# This workflow sets up GitHub runners and runs unit tests
# Triggered on pull requests, pushes to master and manual trigger from github web

# Triggers
name: tests
on:
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
        type: choice
        options:
          - info
          - warning
          - debug

  pull_request:
    branches:
      - master
    types:
      - opened
      - reopened
      - synchronize

  push:
    branches:
      - master

# Cancel previous workflows on the same pull request
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  #        _
  #  _ __ (_)_ __
  #  | '_ \| | '_ \
  #  | |_) | | |_) |
  #  | .__/|_| .__/
  #  |_|     |_|

  build-and-test-pip:
    name: pip (${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10"]
        include:
          - { os: macos-latest,   python-version: "3.12" }
          - { os: windows-latest, python-version: "3.12" }

    steps:
      - uses: actions/checkout@v4.1.6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5.1.0
        with:
          python-version: ${{ matrix.python-version }}
          check-latest: true
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - uses: ./.github/actions/restore-elephant-data

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install coveralls
          pip install -e .[extras,tests]

      - name: List packages
        run: |
          pip list
          python --version

      - name: Test with pytest
        shell: bash
        run: pytest

      - name: Submit Coveralls
        if: runner.os == 'Linux' && matrix.python-version == '3.12'
        run: coveralls --service=github || echo "Coveralls submission failed"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  #  __  __ ____ ___
  # |  \/  |  _ \_ _|
  # | |\/| | |_) | |
  # | |  | |  __/| |
  # |_|  |_|_|  |___|

  # install dependencies and elephant with pip and run MPI
  test-pip-MPI:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ["3.12"]
        os: [ubuntu-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4.1.6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5.1.0
        with:
          python-version: ${{ matrix.python-version }}
          check-latest: true
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Get current hash (SHA) of the elephant_data repo
        id: elephant-data
        run: |
            echo "dataset_hash=$(git ls-remote https://gin.g-node.org/NeuralEnsemble/elephant-data.git HEAD | cut -f1)" >> $GITHUB_OUTPUT

      - uses: actions/cache/restore@v4.2.2
        id: cache-datasets
        with:
          path: ~/elephant-data
          key: datasets-${{ steps.elephant-data.outputs.dataset_hash }}
          restore-keys: datasets-
          enableCrossOsArchive: true

      - name: Setup environment
        run: |
          sudo apt-get update
          sudo apt install -y libopenmpi-dev openmpi-bin
          python -m pip install --upgrade pip
          pip install mpi4py
          pip install -e .[extras,tests]

      - name: List packages
        run: |
          pip list
          python --version

      - name: Test with pytest
        run: |
          if [ -d ~/elephant-data ]; then
          export ELEPHANT_DATA_LOCATION=~/elephant-data
          echo $ELEPHANT_DATA_LOCATION
          fi
          mpiexec -n 1 python -m mpi4py -m pytest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  #   ____                _
  #  / ___|___  _ __   __| | __ _
  # | |   / _ \| '_ \ / _` |/ _` |
  # | |__| (_) | | | | (_| | (_| |
  #  \____\___/|_| |_|\__,_|\__,_|

  # install dependencies with conda and run tests with pytest
  test-conda:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # python versions for elephant: [3.8, 3.9, 3.10, 3.11]
        python-version: [3.11]
        # OS [ubuntu-latest, macos-latest, windows-latest]
        os: [ubuntu-latest]

      # do not cancel all in-progress jobs if any matrix job fails
      fail-fast: false

    steps:
      - name: Get current year-month
        id: date
        run: echo "date=$(date +'%Y-%m')" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4.1.6

      - name: Get pip cache dir
        id: pip-cache
        run: |
          echo "dir=$(pip cache dir)" >> $GITHUB_OUTPUT

      - name: Cache pip
        uses: actions/cache@v4.2.2
        with:
          path: ${{ steps.pip-cache.outputs.dir }}

          key: ${{ runner.os }}-pip-${{hashFiles('requirements/environment-tests.yml') }}-${{ hashFiles('**/CI.yml') }}-${{ steps.date.outputs.date }}

      - name: Get current hash (SHA) of the elephant_data repo
        id: elephant-data
        run: |
            echo "dataset_hash=$(git ls-remote https://gin.g-node.org/NeuralEnsemble/elephant-data.git HEAD | cut -f1)" >> $GITHUB_OUTPUT

      - uses: actions/cache/restore@v4.2.2
        # Loading cache of elephant-data
        id: cache-datasets
        with:
          path: ~/elephant-data
          key: datasets-${{ steps.elephant-data.outputs.dataset_hash }}
          restore-keys: datasets-
          enableCrossOsArchive: true 

      - uses: mamba-org/setup-micromamba@v2
        with:
          create-args: python=${{ matrix.python-version }}
          environment-file: requirements/environment-tests.yml
          init-shell: bash

      - name: Install dependencies
        shell: bash -el {0}
        run: |
          python --version
          micromamba install -y -c conda-forge pytest pytest-cov coveralls mpi4py openmpi
          pip install -e .

      - name: List packages
        shell: bash -el {0}
        run: |
          pip list
          micromamba list
          python --version

      - name: Test with pytest
        shell: bash -el {0}
        run: |
          if [ -d ~/elephant-data ]; then
          export ELEPHANT_DATA_LOCATION=~/elephant-data
          echo $ELEPHANT_DATA_LOCATION
          fi
          pytest --cov=elephant

  #  ____
  # |  _ \  ___   ___ ___
  # | | | |/ _ \ / __/ __|
  # | |_| | (_) | (__\__ \
  # |____/ \___/ \___|___/

  # install dependencies for the documentation and build .html
  docs:
    name: docs (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # python versions for elephant: [3.8, 3.9, 3.10, 3.11, 3.12]
        python-version: [3.12]
        # OS [ubuntu-latest, macos-latest, windows-latest]
        os: [ubuntu-latest]

    steps:

      - name: Get current year-month
        id: date
        run: echo "date=$(date +'%Y-%m')" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4.1.6

      - name: Get pip cache dir
        id: pip-cache
        run: |
          echo "dir=$(pip cache dir)" >> $GITHUB_OUTPUT

      - name: Cache pip
        uses: actions/cache@v4.2.2
        with:
          path: ${{ steps.pip-cache.outputs.dir }}
          # Look to see if there is a cache hit for the corresponding requirements files
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements-docs.txt') }}-${{ hashFiles('**/requirements-tutorials.txt') }}-${{ hashFiles('**/environment-docs.yml') }}
           -${{ hashFiles('**/CI.yml') }}-${{ steps.date.outputs.date }}

      - uses: mamba-org/setup-micromamba@v2
        with:
          create-args: python=${{ matrix.python-version }}
          environment-file: requirements/environment.yml
          init-shell: bash

      - name: Install dependencies
        shell: bash -el {0}
        run: |
          sudo apt-get update
          sudo apt install -y libopenmpi-dev openmpi-bin
          # Moved openmpi pandoc and libstdcxx-ng to environment-docs file        
          # micromamba install -y -c conda-forge openmpi pandoc libstdcxx-ng # fix libstdc++.so.6: version for new scipy versions > 1.9.1
          micromamba env update --file requirements/environment-docs.yml --name elephant
          python -m pip install --upgrade pip
          pip install -e .[extras,tutorials,docs]
          # run notebooks
          sed -i -E "s/nbsphinx_execute *=.*/nbsphinx_execute = 'always'/g" doc/conf.py

      - name: List packages
        shell: bash -el {0}
        run: |
          pip list
          micromamba list
          python --version

      - name: make html
        shell: bash -el {0}
        run: |
          cd doc
          make html

  # install dependencies and elephant with pip and run tests with pytest
  doctests:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # python versions for elephant: [3.7, 3.8, 3.9, "3.10"]
        python-version: ["3.10"]

        # OS [ubuntu-latest, macos-latest, windows-latest]
        os: [ubuntu-latest]

    steps:
      # used to reset cache every month
      - name: Get current year-month
        id: date
        run: echo "::set-output name=date::$(date +'%Y-%m')"
      - uses: actions/checkout@v4.1.6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5.1.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache test_env
        uses: actions/cache@v4.2.2
        with:
          path: ~/test_env
          # Look to see if there is a cache hit for the corresponding requirements files
          # cache will be reset on changes to any requirements or every month
          key: ${{ runner.os }}-venv-${{ hashFiles('**/requirements.txt') }}-${{ hashFiles('**/requirements-tests.txt') }}
            -${{ hashFiles('**/requirements-extras.txt') }}-${{ hashFiles('**/CI.yml') }}-${{ hashFiles('setup.py') }}
            -${{ steps.date.outputs.date }}

      - name: Install dependencies
        run: |
          # create an environment and install everything
          python -m venv ~/test_env
          source ~/test_env/bin/activate
          sudo apt-get update
          sudo apt install -y libopenmpi-dev openmpi-bin

          python -m pip install --upgrade pip
          pip install mpi4py
          pip install pytest-cov coveralls
          pip install -e .[extras,tests]

      - name: List packages
        run: |
          source ~/test_env/bin/activate
          pip list
          python --version

      - name: Run doctests
        run: |
          source ~/test_env/bin/activate
          printf "def pytest_configure(config):\n    import numpy as np\n    import builtins\n    np.set_printoptions(legacy='1.25')\n    builtins.np = np\n" > conftest.py
          pytest elephant --doctest-modules --ignore=elephant/test/
